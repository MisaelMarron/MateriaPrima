{% extends "base.html" %}
{% block title %}Ajustar Producción{% endblock %}

{% block content %}

<div class="form-container">

    <h2 class="form-title">
        Ajustar Unidades de Producción
    </h2>

    <p style="text-align:center; margin-bottom:1rem;">
        <strong>{{ produccion.producto }}</strong>
    </p>

    <p style="text-align:center; margin-bottom:1.5rem;">
        Unidades actuales: <strong>{{ produccion.cantidad_unidad }}</strong>
    </p>

    <form method="post" class="form-box">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="acciones-form">

            <button type="submit" class="btn btn-produce">
                Aplicar
            </button>

            <a href="{% url 'listar_producciones' %}" class="btn btn-delete">
                Cancelar
            </a>

        </div>

    </form>

</div>

{% endblock %}

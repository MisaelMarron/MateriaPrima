<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin-bottom: 40px;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            margin: 4px 0;
            color: #222;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-bottom: 16px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 7px 10px;
            font-size: 12px;
            text-align: left;
        }

        th {
            background: #2c5f9e;
            color: #fff;
        }

        tr:nth-child(even) td {
            background: #f5f8ff;
        }

        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 9px;
            color: #666;
            border-top: 1px solid #ccc;
            padding-top: 4px;
        }
    </style>
</head>

<body>

    <div id="footer">
        Quiwa S.A.C. &nbsp;&middot;&nbsp; Generado el {{ fecha_hora }}
    </div>

    <h1>Inventario de Materias Primas</h1>
    <div class="subtitle">Quiwa S.A.C. &mdash; Reporte generado el {{ fecha_hora }}</div>

    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Unidad</th>
                <th>Cantidad</th>
                <th>Costo</th>
            </tr>
        </thead>
        <tbody>
            {% for m in materias %}
            <tr>
                <td>{{ m.codigo }}</td>
                <td>{{ m.nombre }}</td>
                <td>{{ m.unidad }}</td>
                <td>{{ m.cantidad }}</td>
                <td>S/. {{ m.costo }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>

</html>

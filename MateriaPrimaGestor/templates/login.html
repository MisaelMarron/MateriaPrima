{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-blob blob-1"></div>
    <div class="login-blob blob-2"></div>

    <div class="login-glass-card">
        <div class="login-header">
            <h2 class="login-title">Bienvenido de Nuevo</h2>
            <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
        </div>

        <form method="post" class="login-form">
            {% csrf_token %}

            <div class="login-input-group">
                {{ form.username }}
                <label for="{{ form.username.id_for_label }}">Usuario</label>
            </div>

            <div class="login-input-group">
                {{ form.password }}
                <label for="{{ form.password.id_for_label }}">Contraseña</label>
            </div>

            <button type="submit" class="login-btn">
                <span>Ingresar</span>
            </button>
        </form>

        <div class="login-footer">
            <p>¿No tienes cuenta? <a href="{% url 'register' %}" class="login-link">Regístrate aquí</a></p>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const inputs = document.querySelectorAll('.login-input-group input');
        inputs.forEach(input => {
            input.setAttribute('placeholder', ' ');
        });
    });
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}Proveedores{% endblock %}

{% block content %}
<h1>Lista de Proveedores</h1>

<a href="{% url 'crear_proveedor' %}">➕ Nuevo Proveedor</a>

<table>
    <thead>
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for p in proveedores %}
        <tr>
            <td>{{ p.codigo }}</td>
            <td>{{ p.nombre }}</td>
            <td>
                <a href="{% url 'editar_proveedor' p.codigo %}">Editar</a>
                <a href="{% url 'eliminar_proveedor' p.codigo %}">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No hay proveedores.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
